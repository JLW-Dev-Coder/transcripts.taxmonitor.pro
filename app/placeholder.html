<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcript.Tax Monitor Pro — Support</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/site.css?v=1" />
  <style>
    :root {
      --tm-card: linear-gradient(180deg, rgba(9, 14, 32, 0.96) 0%, rgba(17, 24, 39, 0.98) 52%, rgba(30, 41, 59, 0.98) 100%);
      --tm-shadow: 0 28px 72px rgba(2, 8, 23, 0.52);
      --tm-text: #f8fafc;
      --tm-text-muted: #94a3b8;
    }
    * { box-sizing:border-box; }
    html, body {
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at 14% 16%, rgba(139, 92, 246, 0.16), transparent 22%),
        radial-gradient(circle at 82% 10%, rgba(99, 102, 241, 0.16), transparent 20%),
        radial-gradient(circle at 50% 120%, rgba(76, 29, 149, 0.18), transparent 34%),
        linear-gradient(180deg, #020617 0%, #081121 34%, #0f172a 68%, #172554 100%);
      color:var(--tm-text);
      font-family:'Sora','DM Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    }
    .app-shell { display:flex; min-height:100vh; }
    .sidebar {
      backdrop-filter: blur(20px);
      background: linear-gradient(180deg, rgba(2, 6, 23, 0.98) 0%, rgba(15, 23, 42, 0.98) 46%, rgba(49, 46, 129, 0.94) 100%);
      border-right:1px solid rgba(255,255,255,0.08);
      display:flex;
      flex-direction:column;
      height:100vh;
      overflow-y:auto;
      padding:22px 0;
      position:sticky;
      top:0;
      width:270px;
    }
    .main-shell { display:flex; flex:1; flex-direction:column; min-width:0; }
    .topbar {
      backdrop-filter: blur(20px);
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.14), transparent 32%),
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.10), transparent 28%),
        linear-gradient(180deg, rgba(2, 6, 23, 0.94) 0%, rgba(15, 23, 42, 0.90) 100%);
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:sticky;
      top:0;
      z-index:10;
    }
    .workspace-content { margin:0 auto; max-width:1440px; padding:28px; width:100%; }
  </style>
</head>
<body class="h-full">
  <div class="app-shell">
    <aside class="sidebar">
      <!-- PARTIAL:app-sidebar -->
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <!-- PARTIAL:app-topbar -->
      </header>

      <main class="workspace-content">
        <p style="color:#94a3b8;">Use the first block to create the remaining split pages. This placeholder exists only because your shell had already become a small religion.</p>
      </main>
    </div>
  </div>
</body>
</html>
